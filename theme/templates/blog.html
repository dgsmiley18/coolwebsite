{% extends "base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
    <h1>Posts</h1>
    <ul>
        {% for article in articles %}
        <li>
            <a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a> - {{ article.date.strftime('%B %d, %Y') }}
        </li>
        {% endfor %}
    </ul>
{% endblock %}
